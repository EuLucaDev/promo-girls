name: Deploy Frontend + Apps Script

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-main"
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp index.html styles.css app.js site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  deploy-apps-script:
    runs-on: ubuntu-latest
    needs: deploy-pages
    env:
      GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
      GAS_CLASP_JSON: ${{ secrets.GAS_CLASP_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: precheck
        run: |
          if [ -n "$GAS_SCRIPT_ID" ] && [ -n "$GAS_CLASP_JSON" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Apps Script deploy (missing secrets)
        if: ${{ steps.precheck.outputs.ready != 'true' }}
        run: |
          echo "Skipping Apps Script deploy because GAS_SCRIPT_ID or GAS_CLASP_JSON is missing."

      - name: Setup Node
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        run: npm install -g @google/clasp

      - name: Configure clasp credentials
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        run: |
          echo "$GAS_CLASP_JSON" > ~/.clasprc.json
          cat > gas/.clasp.json <<JSON
          {
            "scriptId": "$GAS_SCRIPT_ID",
            "rootDir": "."
          }
          JSON

      - name: Push to Apps Script
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        working-directory: gas
        run: clasp push --force

      - name: Create version
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        working-directory: gas
        run: clasp version "Auto deploy $GITHUB_SHA"

      - name: Deploy web app
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        working-directory: gas
        run: clasp deploy -d "CI deploy $GITHUB_SHA"
